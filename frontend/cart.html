<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Folio — Your Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css"/>
<link rel="stylesheet" href="css/pages.css"/>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Fo<span>lio</span></a>
  <ul class="nav-links">
    <li><a href="search.html">Browse</a></li>
    <li><a href="cart.html" class="active">Cart</a></li>
    <li><a href="orders.html">Orders</a></li>
  </ul>
  <a href="login.html" class="nav-auth" id="nav-auth-btn">Sign In</a>
</nav>

<div class="page-header">
  <p class="page-eyebrow">— Shopping Cart</p>
  <h1 class="page-title">Your<br/><em>selection.</em></h1>
</div>

<div class="cart-wrap" id="cart-wrap">
  <!-- Populated by JS -->
</div>

<div class="toast" id="toast"></div>

<footer>
  <div class="footer-logo">Fo<span>lio</span></div>
  <p class="footer-copy">© 2026 Folio · All rights reserved</p>
</footer>

<script>
  const BASE_URL = 'http://localhost:8000';
  const BOOK_COLORS = ['#b85c38','#4a6fa5','#2d4a3e','#7a4f7d','#5c4a3a','#3d6b5e','#8c3b2a','#4a7c8e'];
  let cartItems = [];

  function updateNav() {
    const token = localStorage.getItem('folio_token');
    const btn = document.getElementById('nav-auth-btn');
    if (token) {
      btn.textContent = 'Sign Out'; btn.href = '#';
      btn.onclick = e => { e.preventDefault(); localStorage.removeItem('folio_token'); window.location.href='login.html'; };
    }
  }
  updateNav();

  async function loadCart() {
    const token = localStorage.getItem('folio_token');
    const wrap = document.getElementById('cart-wrap');

    if (!token) {
      wrap.innerHTML = `
        <div class="auth-wall">
          <div class="cart-empty-icon">🔒</div>
          <h2 class="auth-wall-title">Sign in to view your cart</h2>
          <p class="auth-wall-sub">Your cart is saved to your account</p>
          <a href="login.html" class="auth-wall-btn">Sign In</a>
        </div>`;
      return;
    }

    try {
      const res = await fetch(`${BASE_URL}/view_cart`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('Failed to load cart');
      const data = await res.json();
      cartItems = Array.isArray(data) ? data : (data.cart_items || data.items || []);
      renderCart();
    } catch (err) {
      // Preview with mock data
      cartItems = getMockCart();
      renderCart();
    }
  }

  function renderCart() {
    const wrap = document.getElementById('cart-wrap');
    if (!cartItems || cartItems.length === 0) {
      wrap.innerHTML = `
        <div class="cart-empty" style="grid-column:1/-1">
          <div class="cart-empty-icon">🛒</div>
          <div class="cart-empty-title">Your cart is empty</div>
          <div class="cart-empty-sub">Add some books to get started</div>
          <a href="search.html" class="browse-link">Browse Books</a>
        </div>`;
      return;
    }

    const subtotal = cartItems.reduce((s, item) => s + (item.price || 0) * (item.quantity || 1), 0);
    const shipping = subtotal > 0 ? 49 : 0;
    const total = subtotal + shipping;

    wrap.innerHTML = `
      <div class="cart-items">
        ${cartItems.map((item, i) => `
          <div class="cart-item" id="item-${item.book_id || item.id || i}" style="animation-delay:${i*0.06}s">
            <div class="item-cover" style="background:${BOOK_COLORS[i % BOOK_COLORS.length]}">${item.title || item.book_title || 'Book'}</div>
            <div class="item-info">
              <div class="item-title">${item.title || item.book_title || 'Unknown Title'}</div>
              <div class="item-author">${item.author || item.book_author || 'Unknown Author'}</div>
              ${item.price ? `<div class="item-price">₹${item.price}</div>` : ''}
            </div>
            <div class="item-controls">
              <div class="qty-wrap">
                <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
                <span class="qty-val" id="qty-${i}">${item.quantity || 1}</span>
                <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
              </div>
              <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
            </div>
          </div>
        `).join('')}
      </div>

      <div class="order-panel">
        <h2 class="panel-title">Place <em>Order</em></h2>
        <div class="summary-row"><span class="summary-label">Subtotal</span><span class="summary-value">₹${subtotal}</span></div>
        <div class="summary-row"><span class="summary-label">Shipping</span><span class="summary-value">₹${shipping}</span></div>
        <div class="summary-total"><span class="summary-label">Total</span><span class="summary-value">₹${total}</span></div>

        <div class="order-form">
          <div class="order-field">
            <label>Delivery Address</label>
            <textarea id="delivery-address" rows="3" placeholder="Enter your full delivery address…"></textarea>
          </div>
          <div class="order-field">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 XXXXX XXXXX"/>
          </div>
          <div class="order-field">
            <label>Notes (optional)</label>
            <input type="text" id="order-notes" placeholder="Any special instructions…"/>
          </div>
          <button class="place-order-btn" id="place-btn" onclick="placeOrder()">
            <span class="btn-text">Place Order</span>
            <span class="spinner"></span>
          </button>
          <p class="panel-note">By placing your order you agree to our terms of service. Delivery within 3–7 business days.</p>
        </div>
      </div>`;
  }

  function changeQty(idx, delta) {
    cartItems[idx].quantity = Math.max(1, (cartItems[idx].quantity || 1) + delta);
    renderCart();
  }

  function removeItem(idx) {
    cartItems.splice(idx, 1);
    renderCart();
    showToast('Item removed from cart', 'success');
  }

  async function placeOrder() {
    const token = localStorage.getItem('folio_token');
    const address = document.getElementById('delivery-address').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const notes = document.getElementById('order-notes').value.trim();
    const btn = document.getElementById('place-btn');

    if (!address) { showToast('Please enter a delivery address', 'error'); return; }

    btn.classList.add('loading'); btn.disabled = true;

    const cartId = cartItems[0]?.cart_id || 1;
    const orderInfo = { address, phone, notes };

    try {
      const res = await fetch(`${BASE_URL}/execute_order?cart_id=${cartId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(orderInfo)
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.detail || 'Order failed'); }
      showToast('Order placed successfully! 🎉', 'success');
      setTimeout(() => window.location.href = 'orders.html', 1500);
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function getMockCart() {
    return [
      { book_id: 1, title: 'The Midnight Library', author: 'Matt Haig', price: 349, quantity: 1 },
      { book_id: 2, title: 'Atomic Habits', author: 'James Clear', price: 399, quantity: 2 },
    ];
  }

  loadCart();
</script>
</body>
</html>
